<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lỗi - RFM Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #1e293b;
            text-align: center;
        }
        .error-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #dc2626;
            font-size: 80px;
            margin: 0 0 10px 0;
        }
        h2 {
            font-size: 24px;
            margin: 0 0 10px 0;
        }
        p {
            color: #64748b;
            margin-bottom: 20px;
        }
        a.btn {
            display: inline-block;
            background: #2563eb;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
        }
        a.btn:hover {
            background: #1d4ed8;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1 th:text="${status != null ? status : 'Lỗi'}">Lỗi</h1>
        <h2 th:if="${status == 403}">Truy cập bị từ chối!</h2>
        <h2 th:if="${status == 404}">Không tìm thấy trang!</h2>
        <h2 th:if="${status != 403 and status != 404}">Đã có lỗi xảy ra!</h2>
        
        <p th:if="${status == 403}">Tài khoản của bạn (Thu ngân) không có quyền truy cập vào trang quản lý này.</p>
        <p th:if="${status != 403}">Rất tiếc, yêu cầu của bạn không thể thực hiện được.</p>
        
        <a th:href="@{/}" class="btn">Trở về Trang chủ</a>
    </div>
</body>
</html>
