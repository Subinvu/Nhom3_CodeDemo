# =============================================
# APPLICATION CONFIGURATION — RFM Clustering
# =============================================

# ── Server ──
server.port=8080

# ── MySQL — Thay IP khi deploy lên VM ──
spring.datasource.url=jdbc:mysql://localhost:3306/rfm_clustering?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=sinbu123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ── AI Service — Thay IP khi deploy lên VM ──
ai.service.url=http://localhost:8000

# ── Thymeleaf ──
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8

# ── Jackson (JSON) ──
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# ── Logging ──
logging.level.com.rfm=INFO
logging.level.org.springframework.web=WARN
